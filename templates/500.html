{% extends 'base.html' %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto py-20 px-6 text-center">
    
    <div class="mb-8 relative inline-block">
        <div class="absolute -inset-4 bg-red-500/20 blur-2xl rounded-full"></div>
        <svg class="w-32 h-32 mx-auto text-red-500 relative z-10 opacity-80" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
        </svg>
    </div>

    <h1 class="text-4xl md:text-6xl font-black text-white mb-4 tracking-tight">500 - Slipped Belt</h1>
    <p class="text-lg md:text-xl text-zinc-400 mb-12 max-w-lg mx-auto">
        Whoops! Looks like the turntable malfunctioned on our end. We've logged the error and our mechanics are looking into it.
    </p>
    
    <div class="flex flex-col sm:flex-row justify-center items-center gap-4">
        <a href="{% url 'home' %}" class="w-full sm:w-auto bg-white text-zinc-950 hover:bg-zinc-200 font-bold py-3.5 px-8 rounded-lg transition-colors shadow-lg flex items-center justify-center gap-2">
            Back to Home
        </a>
    </div>

</div>
{% endblock %}
