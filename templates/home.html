{% extends 'base.html' %}

{% block content %}
<div class="max-w-6xl mx-auto px-6 py-24 md:py-32 flex flex-col md:flex-row items-center justify-between gap-12">
    
    <div class="md:w-1/2">
        <h1 class="text-5xl md:text-7xl font-black text-white mb-6 leading-tight tracking-tight">
            Showcase your <span class="text-brand">vinyl collection.</span>
        </h1>
        <p class="text-xl text-zinc-400 mb-8 max-w-lg">
            A social platform for record collectors. Track your shelf, discover new pressings, and share your favorite spins.
        </p>
        <a href="{% url 'search' %}" class="inline-block bg-brand text-zinc-950 font-bold px-8 py-4 rounded-full text-lg hover:bg-white transition-all">
            Start Exploring
        </a>
    </div>

    <div class="md:w-1/3 flex justify-center">
        <div class="relative group">
            <div class="w-64 h-64 md:w-80 md:h-80 rounded-full bg-zinc-900 border-8 border-zinc-800 flex items-center justify-center shadow-2xl relative overflow-hidden">
                <div class="w-56 h-56 md:w-72 md:h-72 rounded-full bg-black border-4 border-zinc-950 flex items-center justify-center animate-[spin_10s_linear_infinite] group-hover:animate-none transition-all">
                    <div class="w-20 h-20 rounded-full bg-zinc-800 border-4 border-zinc-900 flex items-center justify-center">
                        <div class="w-4 h-4 rounded-full bg-brand"></div>
                    </div>
                </div>
            </div>
            <div class="absolute -top-4 -right-4 w-12 h-12 bg-brand/10 rounded-full blur-xl"></div>
        </div>
    </div>
</div>
{% endblock %}
