{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-16">
    <div class="bg-zinc-900/50 border border-zinc-800 p-8 rounded-xl shadow-xl text-center">
        <h1 class="text-3xl font-black text-white mb-3">Password Updated</h1>
        <p class="text-zinc-400 leading-relaxed">
            Your password has been reset. You can log in with the new password now.
        </p>
        <a href="{% url 'login' %}" class="inline-flex justify-center w-full bg-brand text-zinc-950 py-3 rounded-md font-bold hover:bg-white transition mt-8">
            Log In
        </a>
    </div>
</div>
{% endblock %}
