{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-16">

        <h1 class="text-3xl font-black text-white mb-3">Check Your Email</h1>
        <p class="text-zinc-400 leading-relaxed">
            If an account exists for that address, a password reset link has been sent.
        </p>
        <a href="{% url 'login' %}" class="inline-flex justify-center w-full bg-zinc-800 text-white hover:bg-zinc-700 border border-zinc-700 font-bold py-3 rounded-md transition mt-8">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
