{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto py-16">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-white mb-2">Reset Password</h1>
        <p class="text-zinc-400">Enter your account email and we'll send a reset link.</p>
    </div>

    <form method="POST" class="bg-zinc-900/50 border border-zinc-800 p-8 rounded-xl shadow-xl">
        {% csrf_token %}

        {% if form.email.errors %}
            <div class="bg-red-950/50 border border-red-900 text-red-400 p-3 rounded mb-6 text-sm">
                {{ form.email.errors.0 }}
            </div>
        {% endif %}

        <div>
            <label class="block text-sm font-bold text-zinc-400 mb-2" for="{{ form.email.id_for_label }}">Email</label>
            <input type="email" name="email" autocomplete="email" required id="{{ form.email.id_for_label }}" class="w-full bg-zinc-900 border border-zinc-700 rounded-md p-3 text-white focus:border-brand focus:ring-1 focus:ring-brand outline-none transition">
        </div>

        <button type="submit" class="w-full bg-brand text-zinc-950 py-3 rounded-md font-bold hover:bg-white transition mt-8 cursor-pointer shadow-lg shadow-brand/20">
            Send Reset Link
        </button>
    </form>

    <p class="text-center text-zinc-500 mt-8">
        Remembered it?
        <a href="{% url 'login' %}" class="text-white hover:text-brand font-medium transition">Log in</a>
    </p>
</div>
{% endblock %}
